<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Detalhe de Unidade · FESF Sede</title>
<link rel="stylesheet" href="/app/style.css">
</head>
<body>

<nav class="topnav">
  <div class="brand"><div style="width:32px;height:32px;background:var(--primary);color:#fff;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">FESF</div>
    <div><strong>Detalhe da unidade</strong><span class="muted" style="font-size:11px;display:block">FESF Sede · Administração</span></div></div>
  <div class="tabs">
    <a href="/app/admin.html">Dashboard</a>
    <a href="/app/admin-pagamentos.html">Pagamentos</a>
    <a href="/app/admin-unidades.html">Unidades</a>
    <a href="/app/admin-fornecedores.html">Fornecedores</a>
    <a href="/app/admin-usuarios.html">Usuários</a>
    <a href="/app/admin-relatorios.html">Relatórios</a>
    <a href="/app/admin-auditoria.html">Auditoria</a>
    <a href="/app/admin-emails.html">E-mails</a>
    <a href="/app/admin-status.html">Status</a>
    <a href="/app/admin-api.html">API</a>
    <a href="/app/admin-config.html">Configurações</a>
  </div>
  <div class="userbox"><div><strong id="userNome">—</strong><span class="muted" style="font-size:11px;display:block">FESF Sede · Admin</span></div><div class="avatar" id="userAvatar">—</div><button onclick="sair()">Sair</button></div>
</nav>

<div class="page">
  <a href="/app/admin-unidades.html">← Voltar para unidades</a>
  <div id="conteudo" style="margin-top:12px"></div>
</div>

<script type="module">
import { api, requireSession, clearSession, brl, dataBR, toast, statusLabel} from '/app/api.js';
const usuario = requireSession();
if (!usuario) location.href = '/app/login.html';
if (usuario.papel === 'fornecedor') location.href = '/app/portal.html';
document.getElementById('userNome').textContent = usuario.nome;
document.getElementById('userAvatar').textContent = (usuario.nome || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
window.sair = () => { clearSession(); location.href = '/app/login.html'; };

const id = Number(new URLSearchParams(location.search).get('id'));
if (!id) location.href = '/app/admin-unidades.html';

try {
  const d = await api.detalheUnidade(id);
  // V260: entity header rico alinhado ao mockup screen-unidade-detail
  const u = d.unidade;
  const totalEnvios = d.totais.total_envios || 0;
  const aprovados = (d.totais.aprovados || 0) + (d.totais.pagos || 0);
  const pctAprov = totalEnvios > 0 ? (aprovados / totalEnvios * 100).toFixed(0) : 0;
  // breakdown por origem visual (3 boxes)
  const totalPorOrigem = (d.por_origem || []).reduce((s, o) => s + Number(o.n||0), 0) || 1;
  const origemMap = { portal: { label: 'AUTO-SERVIÇO', cor: 'var(--primary)', bg: 'var(--primary-soft)', txt: 'var(--primary-2)' }, link_publico: { label: 'LINK PÚBLICO', cor: 'var(--accent)', bg: 'var(--accent-soft)', txt: 'var(--accent)' }, manual: { label: 'OPERADOR', cor: 'var(--border-strong, #b8b8b8)', bg: 'var(--surface-2)', txt: 'var(--muted)' } };
  const origemBoxes = ['portal','link_publico','manual'].map(origin => {
    const o = (d.por_origem || []).find(x => x.origem === origin) || { n: 0, total_centavos: 0 };
    const cfg = origemMap[origin];
    const pct = totalPorOrigem > 0 ? (o.n / totalPorOrigem * 100).toFixed(0) : 0;
    return `
      <div style="padding:14px;background:${cfg.bg};border-radius:8px;border-left:3px solid ${cfg.cor}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="origin ${origin}">${statusLabel(origin)}</span>
          <span style="font-size:11.5px;color:var(--muted);font-weight:600">${cfg.label}</span>
        </div>
        <div style="font-size:22px;font-weight:700;color:${cfg.txt};margin:4px 0">${o.n}</div>
        <div style="font-size:12px;color:var(--muted)">${pct}% dos envios${o.total_centavos != null ? ' · ' + brl(o.total_centavos) : ''}</div>
      </div>`;
  }).join('');

  document.getElementById('conteudo').innerHTML = `
    <!-- Entity header rico -->
    <div class="between" style="align-items:flex-start;margin-bottom:18px;gap:18px;flex-wrap:wrap">
      <div style="display:flex;gap:14px;align-items:flex-start">
        <div style="width:56px;height:56px;border-radius:12px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0">${(u.sigla || '?').substring(0,4)}</div>
        <div>
          <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:4px">Unidade · ${u.ativa ? 'ativa' : 'inativa'} ${u.tipo ? '· ' + u.tipo : ''}</div>
          <h1 style="margin:0 0 4px">${u.sigla} — ${u.nome}</h1>
          <div class="muted" style="font-size:13px">${u.cidade || '—'}${u.estado ? '/' + u.estado : ''}${u.cnes ? ' · CNES ' + u.cnes : ''}${u.telefone ? ' · ' + u.telefone : ''}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${u.ativa ? '<span class="pill aprovado">Ativa</span>' : '<span class="pill cancelada">Inativa</span>'}
        ${usuario.papel === 'admin_fesf' && u.id ? `<button onclick="location.href='/app/painel.html'" title="Abrir painel da unidade (operador view)">Painel da unidade</button>` : ''}
      </div>
    </div>

    <!-- KPIs com sub-stats -->
    <div class="kpi-row">
      <div class="kpi"><div class="label">Envios totais</div><div class="value">${totalEnvios}</div><div class="sub">${d.fornecedores_count || 0} fornecedor(es) atendendo</div></div>
      <div class="kpi accent"><div class="label">Movimento</div><div class="value mono" style="font-size:22px">${brl(d.totais.total_centavos)}</div><div class="sub">${pctAprov}% aprovado</div></div>
      <div class="kpi warn"><div class="label">Aguardando ret.</div><div class="value">${d.totais.aguardando_ret}</div><div class="sub">${d.totais.em_analise || 0} em análise</div></div>
      <div class="kpi"><div class="label">Operadores</div><div class="value">${(d.operadores || []).length}</div><div class="sub">cadastrados na unidade</div></div>
    </div>

    <!-- Breakdown por origem visual -->
    <div class="card">
      <div class="between">
        <h3 style="margin:0">Distribuição dos envios · por origem</h3>
        <span class="muted" style="font-size:12px">${totalEnvios} envios totais</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:14px">
        ${origemBoxes}
      </div>
    </div>
    <div class="card">
      <h3>Operadores da unidade (${d.operadores.length})</h3>
      ${d.operadores.length === 0 ? '<div class="muted">Sem operadores cadastrados</div>' :
        `<table><thead><tr><th>Nome</th><th>E-mail</th><th>Status</th><th>Último login</th></tr></thead><tbody>
          ${d.operadores.map(o => `<tr><td>${o.nome}</td><td><code>${o.email}</code></td><td>${o.ativo ? 'Ativo' : 'Inativo'}</td><td>${o.ultimo_login ? new Date(o.ultimo_login).toLocaleString('pt-BR') : '—'}</td></tr>`).join('')}
        </tbody></table>`}
    </div>
    <div class="card">
      <h3>Fornecedores que atendem · ${d.fornecedores_count}</h3>
      <p class="muted">Total de fornecedores ativos vinculados a esta unidade.</p>
    </div>
    <div class="card">
      <h3>Últimos envios (10)</h3>
      ${d.ultimos_envios.length === 0 ? '<div class="muted">Sem envios</div>' :
        `<table><thead><tr><th>Protocolo</th><th>Fornecedor</th><th>Modalidade</th><th>Comp.</th><th>Origem</th><th>Status</th><th>Valor</th><th>Em</th></tr></thead><tbody>
          ${d.ultimos_envios.map(e => `<tr>
            <td><a href="/app/envio.html?id=${e.id}" style="font-family:ui-monospace,monospace;font-size:12px"><code>${e.protocolo}</code></a></td>
            <td>${e.razao_social}</td>
            <td>${e.modalidade_nome}</td>
            <td>${e.competencia}</td>
            <td><span class="origin ${e.origem}">${statusLabel(e.origem)}</span></td>
            <td><span class="pill ${e.status}">${statusLabel(e.status)}</span></td>
            <td style="font-family:ui-monospace,monospace">${brl(e.valor_centavos)}</td>
            <td>${dataBR(e.criado_em)}</td>
          </tr>`).join('')}
        </tbody></table>`}
    </div>
    <div class="card">
      <h3>Pendências</h3>
      ${d.expectativas.length === 0 ? '<div class="muted">Sem expectativas registradas</div>' :
        `<table><thead><tr><th>Status</th><th>Quantidade</th></tr></thead><tbody>
          ${d.expectativas.map(p => `<tr><td><span class="pill ${p.status}">${statusLabel(p.status)}</span></td><td>${p.n}</td></tr>`).join('')}
        </tbody></table>`}
    </div>

    <div class="card">
      <h3>Trilha de alterações</h3>
      <div id="trilha-unidade"><div class="muted">Carregando…</div></div>
    </div>
  `;

  // Endpoint retorna { trilha: [...] }, nao { auditoria: [...] }.
  // Bug V209: codigo lia 'a.auditoria' → sempre undefined → trilha nunca aparecia.
  try {
    const a = await api.auditoria('unidade', id);
    const cont = document.getElementById('trilha-unidade');
    const eventos = a.trilha || a.auditoria || [];
    if (eventos.length === 0) {
      cont.innerHTML = '<div class="muted">Sem eventos registrados</div>';
    } else {
      cont.innerHTML = `<table><thead><tr><th>Quando</th><th>Quem</th><th>Ação</th><th>Detalhe</th></tr></thead><tbody>
        ${eventos.map(x => `<tr>
          <td>${new Date(x.criado_em).toLocaleString('pt-BR')}</td>
          <td>${x.usuario_nome || '<i>sistema</i>'}</td>
          <td><code>${x.acao}</code></td>
          <td>${(x.detalhe || '').substring(0, 160)}</td>
        </tr>`).join('')}
      </tbody></table>`;
    }
  } catch (e) {
    document.getElementById('trilha-unidade').innerHTML = `<div class="alert danger">Erro: ${e.message}</div>`;
  }
} catch (e) {
  document.getElementById('conteudo').innerHTML = `<div class="alert danger">Erro: ${e.message}</div>`;
}
</script>
</body>
</html>
