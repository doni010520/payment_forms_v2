<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Erros do Cliente · FESF Sede</title>
<link rel="stylesheet" href="/app/style.css">
<style>
  /* V291: tela admin para diagnosticar erros sistêmicos capturados do browser */
  .err-row{display:grid;grid-template-columns:130px 100px 1fr 80px 90px;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .12s ease}
  .err-row:hover{background:rgba(91,84,153,.03)}
  .err-row.resolvido{opacity:.55}
  .err-row .quando{color:var(--muted);font-family:ui-monospace,monospace;font-size:11.5px;font-weight:500}
  .err-row .tipo{font-size:10.5px;text-transform:uppercase;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:5px;display:inline-block;text-align:center}
  .err-row .tipo.runtime{background:#ffd6d6;color:#b22828}
  .err-row .tipo.unhandled-rejection{background:#ffe0c2;color:#a05500}
  .err-row .tipo.fetch-fail{background:#fff4d6;color:var(--warning)}
  .err-row .tipo.console-error{background:#e0d9f5;color:var(--primary-2)}
  .err-row .tipo.http-error{background:#ffe0e0;color:#b22828}
  .err-row .msg{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,monospace}
  .err-row .msg .url{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:2px;font-family:inherit}
  .err-row .ocor{text-align:right;font-family:ui-monospace,monospace;font-weight:700;color:var(--text)}
  .err-detail{background:var(--surface-2);padding:18px 20px;border-radius:10px;margin-top:14px;display:none}
  .err-detail.open{display:block}
  .err-detail pre{background:var(--surface);border:1px solid var(--border);padding:10px 12px;border-radius:6px;max-height:300px;overflow:auto;font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-all}
  .err-detail .kv{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:6px 0;border-bottom:1px dotted var(--border);font-size:12.5px}
  .err-detail .kv:last-child{border-bottom:none}
  .err-detail .kv .k{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.5px}
</style>
</head>
<body>

<nav class="topnav">
  <div class="brand">
    <div style="width:32px;height:32px;background:var(--primary);color:#fff;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">FESF</div>
    <div><strong>FESF Sede · Erros do Cliente</strong><span class="muted" style="font-size:11px;display:block">Diagnóstico em tempo real</span></div>
  </div>
  <div class="tabs">
    <a href="/app/admin.html">Dashboard</a>
    <a href="/app/admin-pagamentos.html">Pagamentos</a>
    <a href="/app/admin-unidades.html">Unidades</a>
    <a href="/app/admin-fornecedores.html">Fornecedores</a>
    <a href="/app/admin-usuarios.html">Usuários</a>
    <a href="/app/admin-relatorios.html">Relatórios</a>
    <a href="/app/admin-auditoria.html">Auditoria</a>
    <a href="/app/admin-emails.html">E-mails</a>
    <a href="/app/admin-status.html">Status</a>
    <a class="active">Erros</a>
    <a href="/app/admin-config.html">Configurações</a>
  </div>
  <div class="userbox">
    <div><strong id="userNome">—</strong><span class="muted" style="font-size:11px;display:block">FESF Sede · Admin</span></div>
    <div class="avatar" id="userAvatar">—</div>
    <button onclick="sair()">Sair</button>
  </div>
</nav>

<div class="page">
  <div class="between" style="align-items:flex-start;margin-bottom:18px;gap:18px;flex-wrap:wrap">
    <div>
      <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:4px">Diagnóstico do sistema</div>
      <h1 style="margin:0 0 4px">Erros do cliente</h1>
      <p class="muted" id="sub" style="margin:0;font-size:13.5px">Carregando…</p>
    </div>
    <div class="filters" style="gap:8px">
      <select id="f-tipo">
        <option value="">Todos os tipos</option>
        <option value="runtime">Runtime</option>
        <option value="unhandled-rejection">Promise rejeitada</option>
        <option value="fetch-fail">Falha de rede</option>
        <option value="console-error">console.error</option>
        <option value="http-error">HTTP 5xx</option>
      </select>
      <select id="f-resolvido">
        <option value="false">Não resolvidos</option>
        <option value="true">Resolvidos</option>
        <option value="">Todos</option>
      </select>
      <button onclick="carregar()">Atualizar</button>
    </div>
  </div>

  <div class="kpi-row" id="kpis"></div>

  <div class="card" style="margin:0;padding:0;overflow:hidden">
    <div class="err-row" style="background:var(--surface-2);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);cursor:default">
      <div>Quando</div><div>Tipo</div><div>Mensagem</div><div style="text-align:right">Ocor.</div><div></div>
    </div>
    <div id="lista"></div>
  </div>

  <div id="detail-wrap"></div>
</div>

<script type="module">
import { api, requireSession, clearSession, toast } from '/app/api.js';
const usuario = requireSession();
if (!usuario || usuario.papel !== 'admin_fesf') location.href = '/app/login.html';
document.getElementById('userNome').textContent = usuario.nome;
document.getElementById('userAvatar').textContent = (usuario.nome || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
window.sair = () => { clearSession(); location.href = '/app/login.html'; };

const token = localStorage.getItem('fesf_token');
const H = { Authorization: `Bearer ${token}` };

async function carregar() {
  const tipo = document.getElementById('f-tipo').value;
  const resolvido = document.getElementById('f-resolvido').value;
  const params = new URLSearchParams();
  if (tipo) params.set('tipo', tipo);
  if (resolvido !== '') params.set('resolvido', resolvido);
  const url = '/api/admin/client-errors' + (params.toString() ? `?${params}` : '');
  try {
    const r = await fetch(url, { headers: H }).then(r => r.json());
    const stats = await fetch('/api/admin/client-errors/stats', { headers: H }).then(r => r.json());
    document.getElementById('sub').textContent = `${r.total} erro(s) ${resolvido === 'false' ? 'não resolvido(s)' : resolvido === 'true' ? 'resolvido(s)' : 'no total'} · ${stats.total_nao_resolvidos} ocorrências totais pendentes`;
    // KPIs por tipo
    const porTipo = Object.fromEntries((stats.por_tipo || []).map(p => [p.tipo, p]));
    const tipos = ['runtime', 'unhandled-rejection', 'fetch-fail', 'console-error', 'http-error'];
    const labels = { runtime: 'Runtime', 'unhandled-rejection': 'Promise rej.', 'fetch-fail': 'Falha rede', 'console-error': 'Console', 'http-error': 'HTTP 5xx' };
    document.getElementById('kpis').innerHTML = tipos.map(t => {
      const p = porTipo[t];
      const n = p?.n || 0;
      const total = p?.total || 0;
      const variantes = { runtime: 'danger', 'unhandled-rejection': 'warn', 'fetch-fail': 'warn', 'console-error': '', 'http-error': 'danger' };
      return `<div class="kpi ${variantes[t]}"><div class="label">${labels[t]}</div><div class="value">${n}</div><div class="sub">${total} ocorrência(s)</div></div>`;
    }).join('');
    // Lista
    const lista = document.getElementById('lista');
    if ((r.erros || []).length === 0) {
      lista.innerHTML = '<div class="empty-state"><span class="icon">✓</span><h3>Nenhum erro</h3><p>O sistema está saudável — ou o filtro não retornou resultados.</p></div>';
      return;
    }
    lista.innerHTML = r.erros.map(e => {
      const when = new Date(e.ultima_ocorrencia).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      return `
        <div class="err-row ${e.resolvido ? 'resolvido' : ''}" data-id="${e.id}">
          <div class="quando">${when}</div>
          <div><span class="tipo ${e.tipo}">${e.tipo}</span></div>
          <div class="msg" title="${(e.mensagem||'').replace(/"/g,'&quot;')}">${e.mensagem}<span class="url">${e.url || ''}</span></div>
          <div class="ocor">${e.ocorrencias}×</div>
          <div style="text-align:right">
            ${e.resolvido ? '<span class="muted" style="font-size:11px">✓ resolvido</span>' : `<button onclick="event.stopPropagation();resolver(${e.id})">Resolver</button>`}
          </div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('.err-row[data-id]').forEach(row => {
      row.addEventListener('click', () => mostrarDetalhe(r.erros.find(x => x.id === Number(row.dataset.id))));
    });
  } catch (e) { toast('Erro: ' + e.message, 'erro'); console.error(e); }
}
window.carregar = carregar;

window.resolver = async (id) => {
  if (!confirm('Marcar como resolvido?')) return;
  try {
    await fetch(`/api/admin/client-errors/${id}/resolver`, { method:'PATCH', headers: H });
    toast('Marcado como resolvido', 'sucesso');
    carregar();
  } catch (e) { toast('Erro: ' + e.message, 'erro'); }
};

function mostrarDetalhe(e) {
  if (!e) return;
  const w = document.getElementById('detail-wrap');
  const when = new Date(e.criado_em).toLocaleString('pt-BR');
  const ultima = new Date(e.ultima_ocorrencia).toLocaleString('pt-BR');
  w.innerHTML = `
    <div class="card err-detail open">
      <div class="between" style="margin-bottom:12px">
        <h3 style="margin:0">Detalhes do erro #${e.id}</h3>
        <button onclick="document.getElementById('detail-wrap').innerHTML=''">Fechar</button>
      </div>
      <div class="kv"><span class="k">Tipo</span><span><span class="tipo ${e.tipo}">${e.tipo}</span></span></div>
      <div class="kv"><span class="k">Mensagem</span><span style="font-family:ui-monospace,monospace">${e.mensagem}</span></div>
      <div class="kv"><span class="k">URL</span><span style="font-family:ui-monospace,monospace;font-size:12px;word-break:break-all">${e.url || '—'}</span></div>
      <div class="kv"><span class="k">User Agent</span><span style="font-size:11.5px">${e.user_agent || '—'}</span></div>
      <div class="kv"><span class="k">Usuário</span><span>${e.usuario_nome || '<i>anônimo</i>'} ${e.papel ? '· '+e.papel : ''}</span></div>
      ${e.request_method ? `<div class="kv"><span class="k">Request</span><span style="font-family:ui-monospace,monospace">${e.request_method} ${e.request_url || ''} ${e.http_status ? '→ '+e.http_status : ''}</span></div>` : ''}
      <div class="kv"><span class="k">Primeira</span><span>${when}</span></div>
      <div class="kv"><span class="k">Última</span><span>${ultima}</span></div>
      <div class="kv"><span class="k">Ocorrências</span><span style="font-weight:700">${e.ocorrencias}×</span></div>
      ${e.stack ? `<div style="margin-top:14px"><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Stack trace</div><pre>${(e.stack||'').replace(/</g,'&lt;')}</pre></div>` : ''}
    </div>
  `;
  w.scrollIntoView({ behavior:'smooth', block:'start' });
}

document.getElementById('f-tipo').addEventListener('change', carregar);
document.getElementById('f-resolvido').addEventListener('change', carregar);
carregar();
// Auto-refresh a cada 30s
setInterval(carregar, 30000);
</script>
</body>
</html>
