<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notificações · FESF</title>
<link rel="stylesheet" href="/app/style.css">
<style>
  /* V278: notif-list com sombra sutil + items com unread dot + hover suave */
  .notif-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(20,20,30,.04)}
  .notif-item{display:grid;grid-template-columns:auto 1fr auto;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);align-items:flex-start;cursor:pointer;transition:background .15s ease;position:relative}
  .notif-item:hover{background:rgba(91,84,153,.03)}
  .notif-item:last-child{border-bottom:0}
  .notif-item.lida{opacity:.65}
  /* Indicador visual de não-lida: ponto roxo à esquerda */
  .notif-item:not(.lida)::before{content:"";position:absolute;left:8px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px rgba(91,84,153,.15)}
  .notif-item:not(.lida){padding-left:24px}
  .notif-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 1px 2px rgba(20,20,30,.06)}
  .notif-icon.envio{background:#e3f0ff;color:#0066cc}
  .notif-icon.aprovacao{background:#d4f0d6;color:#2f7d5c}
  .notif-icon.rejeicao{background:#ffd6d6;color:#b22828}
  .notif-icon.retificacao{background:#fff4d6;color:#a06800}
  .notif-icon.pagamento{background:#e0d9f5;color:#5c3da6}
  .notif-icon.sistema{background:#e5e5e5;color:#666}
  .notif-icon.comentario{background:#d6f0ee;color:#0a7d75}
  .notif-body strong{display:block;font-size:13.5px;margin-bottom:4px;font-weight:600;color:var(--text)}
  .notif-body p{margin:0;font-size:13px;color:var(--text-2);line-height:1.5}
  .notif-meta{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;font-weight:500}
  /* Filtros chips com transition + hover + active glow */
  .filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .filtro-chip{padding:7px 14px;border-radius:18px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text-2);transition:all .15s ease}
  .filtro-chip:hover:not(.ativo){background:var(--surface-2);border-color:var(--border-strong, #c8c4b5);color:var(--text)}
  .filtro-chip.ativo{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;box-shadow:0 2px 6px rgba(91,84,153,.25)}
</style>
</head>
<body>

<nav class="topnav">
  <div class="brand">
    <div style="width:32px;height:32px;background:var(--primary);color:#fff;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">FESF</div>
    <div><strong>Central de notificações</strong><span class="muted" style="font-size:11px;display:block">Histórico completo de avisos</span></div>
  </div>
  <div class="tabs">
    <a id="link-voltar">← Voltar</a>
  </div>
  <div class="userbox">
    <div><strong id="userNome">—</strong><span class="muted" style="font-size:11px;display:block" id="userPapelDesc">—</span></div>
    <div class="avatar" id="userAvatar">—</div>
    <button onclick="sair()">Sair</button>
  </div>
</nav>

<div class="page">
  <!-- V265: header rico alinhado ao mockup screen-notif -->
  <div class="between" style="align-items:flex-start;margin-bottom:18px;gap:18px;flex-wrap:wrap">
    <div>
      <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:4px">Central de notificações</div>
      <h1 style="margin:0 0 4px">Notificações</h1>
      <p class="muted" style="margin:0;font-size:13.5px">Todas as atualizações sobre seus envios, fornecedores e operação. <span id="contador">Carregando…</span></p>
    </div>
    <div class="filters" style="gap:8px">
      <a href="/app/perfil.html" style="font-size:12.5px;align-self:center;font-weight:500" title="Configurar preferências de notificação">⚙ Configurar</a>
      <button class="primary" onclick="marcarTodas()" id="btn-todas">✓ Marcar todas como lidas</button>
    </div>
  </div>

  <div class="filtros">
    <div class="filtro-chip ativo" data-f="">Todas</div>
    <div class="filtro-chip" data-f="nao-lidas">Não lidas</div>
    <div class="filtro-chip" data-f="envio">Envios</div>
    <div class="filtro-chip" data-f="aprovacao">Aprovações</div>
    <div class="filtro-chip" data-f="rejeicao">Rejeições</div>
    <div class="filtro-chip" data-f="retificacao">Retificações</div>
    <div class="filtro-chip" data-f="pagamento">Pagamentos</div>
    <div class="filtro-chip" data-f="comentario">Comentários</div>
    <div class="filtro-chip" data-f="sistema">Sistema</div>
  </div>

  <div id="lista" class="notif-list"></div>
</div>

<script type="module">
import { api, requireSession, clearSession, dataBR, toast } from '/app/api.js';
const u = requireSession();
document.getElementById('userNome').textContent = u.nome;
document.getElementById('userAvatar').textContent = (u.nome || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
document.getElementById('userPapelDesc').textContent = ({fornecedor:'Fornecedor', operador_unidade:'Operador', admin_fesf:'FESF Sede · Admin'})[u.papel] || u.papel;
window.sair = () => { clearSession(); location.href = '/app/login.html'; };
document.getElementById('link-voltar').href = ({fornecedor:'/app/portal.html', operador_unidade:'/app/painel.html', admin_fesf:'/app/admin.html'})[u.papel] || '/app/login.html';

let todas = [];
let filtroAtivo = '';

function rotuloTipo(t) {
  return ({
    novo_envio: 'Novo envio',
    envio_aprovado: 'Envio aprovado',
    envio_rejeitado: 'Envio rejeitado',
    retificacao_solicitada: 'Retificação solicitada',
    envio_pago: 'Pagamento processado',
    novo_comentario: 'Novo comentário',
    lembrete_envio: 'Lembrete',
    pendencia_atrasada: 'Pendência atrasada',
    sistema: 'Sistema',
  })[t] || t;
}

function iconePara(t) {
  if (t.includes('aprovad')) return ['aprovacao','✓'];
  if (t.includes('rejeit')) return ['rejeicao','✕'];
  if (t.includes('retifica')) return ['retificacao','✎'];
  if (t.includes('pago') || t.includes('pagamento')) return ['pagamento','💰'];
  if (t.includes('coment')) return ['comentario','💬'];
  if (t.includes('envio')) return ['envio','📨'];
  return ['sistema','ℹ'];
}

function categoria(t) {
  if (t.includes('aprovad')) return 'aprovacao';
  if (t.includes('rejeit')) return 'rejeicao';
  if (t.includes('retifica')) return 'retificacao';
  if (t.includes('pago') || t.includes('pagamento')) return 'pagamento';
  if (t.includes('coment')) return 'comentario';
  if (t.includes('envio')) return 'envio';
  return 'sistema';
}

function destinoNotif(n) {
  if (n.entidade === 'envio' && n.entidade_id) return `/app/envio.html?id=${n.entidade_id}`;
  return null;
}

async function carregar() {
  try {
    const r = await api.notificacoes();
    todas = r.notificacoes || [];
    renderizar();
    const naoLidas = todas.filter(x => !x.lida).length;
    document.getElementById('contador').textContent = `${todas.length} notificações no total · ${naoLidas} não lidas`;
    document.getElementById('btn-todas').disabled = naoLidas === 0;
  } catch (e) { toast('Erro: ' + e.message, 'erro'); }
}

function renderizar() {
  let lista = todas;
  if (filtroAtivo === 'nao-lidas') lista = lista.filter(n => !n.lida);
  else if (filtroAtivo) lista = lista.filter(n => categoria(n.tipo) === filtroAtivo);

  if (lista.length === 0) {
    document.getElementById('lista').innerHTML = '<div class="empty-state"><span class="icon">📭</span><strong>Nenhuma notificação</strong><p style="margin:4px 0 0">Quando algo importante acontecer, você verá aqui.</p></div>';
    return;
  }

  document.getElementById('lista').innerHTML = lista.map(n => {
    const [cls, icon] = iconePara(n.tipo);
    const dest = destinoNotif(n);
    return `
      <div class="notif-item ${n.lida ? 'lida' : ''}" data-id="${n.id}" data-dest="${dest || ''}">
        <div class="notif-icon ${cls}">${icon}</div>
        <div class="notif-body">
          <strong>${rotuloTipo(n.tipo)}</strong>
          <p>${n.mensagem || ''}</p>
        </div>
        <div class="notif-meta">${new Date(n.criada_em).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })}</div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.notif-item').forEach(el => el.addEventListener('click', async () => {
    const id = Number(el.dataset.id);
    const dest = el.dataset.dest;
    if (!el.classList.contains('lida')) {
      try { await api.marcarLida(id); el.classList.add('lida'); } catch {}
    }
    if (dest) location.href = dest;
  }));
}

document.querySelectorAll('.filtro-chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('.filtro-chip').forEach(x => x.classList.remove('ativo'));
  c.classList.add('ativo');
  filtroAtivo = c.dataset.f;
  renderizar();
}));

window.marcarTodas = async () => {
  try {
    await api.marcarTodasLidas();
    toast('Todas marcadas como lidas', 'sucesso');
    carregar();
  } catch (e) { toast(e.message, 'erro'); }
};

carregar();
</script>

</body>
</html>
